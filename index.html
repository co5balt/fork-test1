<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>테트리스 - 바이브 코딩 실습</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Consolas', monospace;
      color: #e2e8f0;
    }
    .game-container { display: flex; gap: 24px; align-items: flex-start; }
    #gameCanvas { border: 2px solid #334155; background: #0f172a; display: block; }
    .side-panel { width: 150px; display: flex; flex-direction: column; gap: 16px; }
    .panel-box { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; }
    .panel-box h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #64748b; margin-bottom: 8px; }
    .panel-box .value { font-size: 28px; font-weight: bold; color: #e2e8f0; }
    #nextCanvas { background: #0f172a; border: 1px solid #334155; display: block; margin-top: 8px; }
    #overlay {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.75); justify-content: center; align-items: center;
      flex-direction: column; gap: 16px; font-size: 24px; color: #f1f5f9;
    }
    #overlay.show { display: flex; }
    #restartBtn {
      background: #3b82f6; color: white; border: none; padding: 10px 28px;
      font-size: 16px; border-radius: 6px; cursor: pointer; font-family: 'Consolas', monospace;
    }
    #restartBtn:hover { background: #2563eb; }
    .canvas-wrapper { position: relative; }
    .controls { font-size: 12px; color: #475569; line-height: 1.8; }
  </style>
</head>
<body>
<div class="game-container">
  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="300" height="600"></canvas>
    <div id="overlay">
      <div>GAME OVER</div>
      <button id="restartBtn">다시 시작</button>
    </div>
  </div>
  <div class="side-panel">
    <div class="panel-box"><h3>점수</h3><div class="value" id="scoreDisplay">0</div></div>
    <div class="panel-box"><h3>레벨</h3><div class="value" id="levelDisplay">1</div></div>
    <div class="panel-box"><h3>라인</h3><div class="value" id="linesDisplay">0</div></div>
    <!-- 다음 블록 미리보기 -->
    <div class="panel-box">
      <h3>NEXT</h3>
      <canvas id="nextCanvas" width="100" height="100"></canvas>
    </div>
    <div class="panel-box controls"><h3>조작법</h3>← → 이동<br>↑ 회전<br>↓ 빠르게</div>
  </div>
</div>
<script>
const COLS       = 10;
const ROWS       = 20;
const BLOCK_SIZE = 30;

const SHAPES = {
  I: [[1,1,1,1]],
  O: [[1,1],[1,1]],
  T: [[0,1,0],[1,1,1]],
  S: [[0,1,1],[1,1,0]],
  Z: [[1,1,0],[0,1,1]],
  L: [[1,0],[1,0],[1,1]],
  J: [[0,1],[0,1],[1,1]],
};
const COLORS = {
  I:'#00f0f0', O:'#f0f000', T:'#a000f0',
  S:'#00f000', Z:'#f00000', L:'#f0a000', J:'#0000f0',
};
const PIECE_TYPES = Object.keys(SHAPES);

const canvas     = document.getElementById('gameCanvas');
const ctx        = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nextCtx    = nextCanvas.getContext('2d');

let board        = [];
let currentPiece = null;
let nextPiece    = null;   // 다음 블록
let score        = 0;
let level        = 1;
let linesCleared = 0;
let gameOver     = false;
let lastTime     = 0;
let dropInterval = 1000;

function drawBlock(x, y, color, context = ctx, size = BLOCK_SIZE) {
  context.fillStyle = color;
  context.fillRect(x * size, y * size, size - 1, size - 1);
  context.fillStyle = 'rgba(255,255,255,0.2)';
  context.fillRect(x * size, y * size, size - 1, 4);
}

// 보드 초기화
function initBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++)
    board.push(new Array(COLS).fill(null));
}

// 랜덤 블록 객체 생성 (할당 없이 반환)
function randomPiece() {
  const type  = PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];
  const shape = SHAPES[type];
  return {
    shape,
    color: COLORS[type],
    x: Math.floor((COLS - shape[0].length) / 2),
    y: 0,
  };
}

// currentPiece = nextPiece, nextPiece = 새 랜덤 블록
function createPiece() {
  currentPiece = nextPiece || randomPiece();
  currentPiece.x = Math.floor((COLS - currentPiece.shape[0].length) / 2);
  currentPiece.y = 0;
  nextPiece = randomPiece();
  drawNextPiece();
}

// 다음 블록 미리보기 그리기
function drawNextPiece() {
  const size = 20;
  nextCtx.fillStyle = '#0f172a';
  nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
  if (!nextPiece) return;
  const shape  = nextPiece.shape;
  const offsetX = Math.floor((5 - shape[0].length) / 2);
  const offsetY = Math.floor((5 - shape.length) / 2);
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[r].length; c++)
      if (shape[r][c])
        drawBlock(offsetX + c, offsetY + r, nextPiece.color, nextCtx, size);
}

// 충돌 감지
function isCollision(piece, dx, dy) {
  for (let r = 0; r < piece.shape.length; r++) {
    for (let c = 0; c < piece.shape[r].length; c++) {
      if (!piece.shape[r][c]) continue;
      const newX = piece.x + c + dx;
      const newY = piece.y + r + dy;
      if (newX < 0 || newX >= COLS) return true;
      if (newY >= ROWS) return true;
      if (newY >= 0 && board[newY][newX] !== null) return true;
    }
  }
  return false;
}

// 90도 시계방향 회전
function rotate(shape) {
  const rows = shape.length, cols = shape[0].length;
  const result = Array.from({ length: cols }, () => new Array(rows).fill(0));
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      result[c][rows - 1 - r] = shape[r][c];
  return result;
}

// 블록 보드에 고정
function placePiece() {
  for (let r = 0; r < currentPiece.shape.length; r++)
    for (let c = 0; c < currentPiece.shape[r].length; c++)
      if (currentPiece.shape[r][c])
        board[currentPiece.y + r][currentPiece.x + c] = currentPiece.color;
}

// 줄 제거 및 점수·레벨 계산
function clearLines() {
  const points = [0, 100, 300, 500, 800];
  let count = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(cell => cell !== null)) {
      board.splice(r, 1);
      board.unshift(new Array(COLS).fill(null));
      count++;
      r++;
    }
  }
  if (count > 0) {
    score        += points[count] * level;
    linesCleared += count;
    // 10줄마다 레벨 1 증가, 속도 증가
    level        = Math.floor(linesCleared / 10) + 1;
    dropInterval = Math.max(100, 1000 - (level - 1) * 100);
  }
}

// 화면 그리기
function draw() {
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 0.5;
  for (let c = 0; c < COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * BLOCK_SIZE, 0); ctx.lineTo(c * BLOCK_SIZE, canvas.height); ctx.stroke();
  }
  for (let r = 0; r < ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * BLOCK_SIZE); ctx.lineTo(canvas.width, r * BLOCK_SIZE); ctx.stroke();
  }

  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c]) drawBlock(c, r, board[r][c]);

  if (currentPiece)
    for (let r = 0; r < currentPiece.shape.length; r++)
      for (let c = 0; c < currentPiece.shape[r].length; c++)
        if (currentPiece.shape[r][c])
          drawBlock(currentPiece.x + c, currentPiece.y + r, currentPiece.color);
}

// 키보드 입력
document.addEventListener('keydown', (e) => {
  if (gameOver || !currentPiece) return;
  switch (e.key) {
    case 'ArrowLeft':
      if (!isCollision(currentPiece, -1, 0)) currentPiece.x -= 1;
      break;
    case 'ArrowRight':
      if (!isCollision(currentPiece, 1, 0)) currentPiece.x += 1;
      break;
    case 'ArrowDown':
      if (!isCollision(currentPiece, 0, 1)) {
        currentPiece.y += 1;
      } else {
        placePiece(); clearLines(); updateUI(); createPiece();
        if (isCollision(currentPiece, 0, 0)) { gameOver = true; showGameOver(); }
      }
      break;
    case 'ArrowUp':
      const rotated = rotate(currentPiece.shape);
      const prev    = currentPiece.shape;
      currentPiece.shape = rotated;
      if (isCollision(currentPiece, 0, 0)) currentPiece.shape = prev;
      break;
  }
  draw();
});

// 게임 루프
function gameLoop(timestamp) {
  if (gameOver) return;
  const delta = timestamp - lastTime;
  if (delta > dropInterval) {
    if (!isCollision(currentPiece, 0, 1)) {
      currentPiece.y += 1;
    } else {
      placePiece(); clearLines(); updateUI(); createPiece();
      if (isCollision(currentPiece, 0, 0)) { gameOver = true; showGameOver(); return; }
    }
    lastTime = timestamp;
  }
  draw();
  requestAnimationFrame(gameLoop);
}

function updateUI() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent = level;
  document.getElementById('linesDisplay').textContent = linesCleared;
}

function showGameOver() {
  document.getElementById('overlay').classList.add('show');
}

function startGame() {
  initBoard();
  score = 0; level = 1; linesCleared = 0;
  gameOver = false; dropInterval = 1000; lastTime = 0;
  nextPiece = randomPiece();   // 먼저 nextPiece 준비
  createPiece();               // currentPiece = nextPiece, 새 nextPiece 생성
  updateUI();
  document.getElementById('overlay').classList.remove('show');
  requestAnimationFrame(gameLoop);
}

document.getElementById('restartBtn').addEventListener('click', startGame);
startGame();
</script>
</body>
</html>
